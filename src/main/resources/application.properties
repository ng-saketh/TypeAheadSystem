spring.application.name=typeahead-system
server.port=8080

# Logging
logging.level.root=INFO
logging.level.com.typeahead=DEBUG

# TypeAhead Configuration - Trie
typeahead.trie.maxSuggestions=5
typeahead.rebuild.intervalMinutes=900000

# TypeAhead Configuration - Cache
typeahead.cache.maxSize=10000

# TypeAhead Configuration - Rate Limiter
typeahead.ratelimit.maxRequestsPerSecond=100

# TypeAhead Configuration - Input Validation
typeahead.validation.maxPrefixLength=100
typeahead.validation.maxFrequency=1000000

# Spring Boot Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.h2.console.enabled=true
